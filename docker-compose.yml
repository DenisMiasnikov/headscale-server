services:
  postgres:
    image: postgres:15
    container_name: headscale-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: headscale
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    networks:
      - headscale-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  headscale:
    image: ${DOCKER_USERNAME}/headscale:latest
    container_name: headscale
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      - SERVER_URL=${SERVER_URL}
      - BASE_DOMAIN=${BASE_DOMAIN}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DEFAULT_USER=${DEFAULT_USER}
    volumes:
      - ./headscale/config.yaml:/etc/headscale/config.yaml
      - ./headscale/data:/var/lib/headscale
    networks:
      - headscale-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.headscale.rule=Host(`${DOMAIN}`) && (PathPrefix(`/api/`) || PathPrefix(`/key`) || PathPrefix(`/ts2021`) || PathPrefix(`/swagger`) || PathPrefix(`/version`) || PathPrefix(`/noise`) || PathPrefix(`/derp`) || Path(`/machine`) || PathPrefix(`/machine/`))"
      - "traefik.http.routers.headscale.entrypoints=websecure"
      - "traefik.http.routers.headscale.tls.certresolver=le"
      - "traefik.http.routers.headscale.priority=10"
      - "traefik.http.services.headscale.loadbalancer.server.port=8080"

  ui:
    image: ${DOCKER_USERNAME}/headscale-ui:latest
    container_name: headscale-ui
    restart: unless-stopped
    depends_on:
      - headscale
      - minio
    env_file:
      - ./.env
    environment:
      - HEADSCALE_URL=http://headscale:8080
      - HEADSCALE_API_KEY_FILE=/var/lib/headscale/apikey.txt
      - NODE_ENV=production
      - COOKIE_SECURE=${COOKIE_SECURE}
      - USERS_FILE=/var/lib/headscale/users.json
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET=avatars
      - MINIO_URL=https://${DOMAIN}/avatars
    volumes:
      - ./headscale/data:/var/lib/headscale
    networks:
      - headscale-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ui-api.rule=Host(`${DOMAIN}`) && (PathPrefix(`/api/internal`))"
      - "traefik.http.routers.ui-api.entrypoints=websecure"
      - "traefik.http.routers.ui-api.tls.certresolver=le"
      - "traefik.http.routers.ui-api.priority=20"
      - "traefik.http.routers.ui.rule=Host(`${DOMAIN}`) && PathPrefix(`/`)"
      - "traefik.http.routers.ui.entrypoints=websecure"
      - "traefik.http.routers.ui.tls.certresolver=le"
      - "traefik.http.routers.ui.priority=15"
      - "traefik.http.routers.ui.middlewares=redirect-root,redirect-register"
      - "traefik.http.middlewares.redirect-root.redirectregex.regex=^/$"
      - "traefik.http.middlewares.redirect-root.redirectregex.replacement=/login"
      - "traefik.http.middlewares.redirect-root.redirectregex.permanent=true"
      - "traefik.http.middlewares.redirect-register.redirectregex.regex=^/register/([^/]+)$"
      - "traefik.http.middlewares.redirect-register.redirectregex.replacement=/machines?key=$1"
      - "traefik.http.middlewares.redirect-register.redirectregex.permanent=true"
      - "traefik.http.services.ui.loadbalancer.server.port=3000"
      - "traefik.http.routers.ui-api.service=ui-api-svc"
      - "traefik.http.services.ui-api-svc.loadbalancer.server.port=3000"

  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik.yml:/traefik.yml:ro
      - ./acme.json:/acme.json
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - headscale-net
    command:
      - --configfile=/traefik.yml
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--configfile=/traefik.yml"]
      interval: 30s
      timeout: 10s
      retries: 3

  minio:
    image: minio/minio:latest
    container_name: headscale-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./minio-data:/data
    networks:
      - headscale-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minio-console.rule=Host(`console.${DOMAIN}`)"
      - "traefik.http.routers.minio-console.entrypoints=websecure"
      - "traefik.http.routers.minio-console.tls.certresolver=le"
      - "traefik.http.routers.minio-console.service=minio-console-svc"
      - "traefik.http.services.minio-console-svc.loadbalancer.server.port=9001"
networks:
  headscale-net:
    driver: bridge
