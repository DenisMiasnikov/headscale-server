# Traefik static configuration

# Enable ping for healthcheck
ping:
  entryPoint: web

# API / dashboard (optional, enable only for debugging)
# api:
#   insecure: true

providers:
  docker:
    exposedByDefault: false
    network: headscale-net

certificatesResolvers:
  le:
    acme:
      email: ${LETSENCRYPT_EMAIL}
      storage: /acme.json
      httpChallenge:
        entryPoint: web

entryPoints:
  web:
    address: :80
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: :443
    http:
      tls:
        certResolver: le
