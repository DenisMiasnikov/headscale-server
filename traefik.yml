# traefik.yml
log:
  level: INFO

ping:
  entryPoint: web

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    address: ":443"
    http:
      tls:
        certResolver: le

providers:
  docker:
    exposedByDefault: false
    network: headscale_headscale-net

certificatesResolvers:
  le:
    acme:
      email: denisreactfe@gmail.com
      storage: /acme.json
      httpChallenge:
        entryPoint: web
