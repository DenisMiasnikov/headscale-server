# traefik.yml - fully working minimal static config

ping:
  entryPoint: web

providers:
  docker:
    exposedByDefault: false
    network: headscale-net

certificatesResolvers:
  le:
    acme:
      email: denisreactfe@gmail.com
      storage: /acme.json
      httpChallenge:
        entryPoint: web

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"
    http:
      tls:
        certResolver: le
