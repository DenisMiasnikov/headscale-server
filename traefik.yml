# Traefik static configuration

# API (dashboard) - disabled in production, enable for debugging if needed
# api:
#   insecure: true

providers:
  docker:
    exposedByDefault: false  # Only containers with explicit label are exposed
    network: headscale-net

certificatesResolvers:
  le:
    acme:
      email: ${LETSENCRYPT_EMAIL}
      storage: /acme.json
      httpChallenge:
        entryPoint: web

entryPoints:
  web:
    address: :80
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: :443
    http:
      tls:
        certResolver: le
